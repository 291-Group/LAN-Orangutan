<!DOCTYPE html>
<html lang="en" data-theme="{{.Theme}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - LAN Orangutan</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/orangutan.svg">
</head>
<body class="login-body">
    <main class="login-main">
        <div class="login-card">
            <div class="login-brand">
                <img src="/static/orangutan.svg" alt="" class="login-logo" width="72" height="72">
                <h1>LAN Orangutan</h1>
            </div>

            {{if .Error}}
            <div class="alert alert-error">{{.Error}}</div>
            {{end}}

            <form method="POST" action="/login" class="login-form">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="input"
                        autocomplete="current-password"
                        autofocus
                        required>
                </div>
                <button type="submit" class="btn btn-primary login-submit">Sign in</button>
            </form>
        </div>
    </main>

    <script>
        // Apply the saved theme before anything is shown, matching the rest of
        // the app so the login page does not flash the wrong colours.
        (function () {
            var saved = localStorage.getItem('theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
            }
        })();
    </script>
</body>
</html>
